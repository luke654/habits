<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luca — Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0e0f;
  --surface:#161617;
  --surface2:#1e1e20;
  --surface3:#252527;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#f0f0ee;
  --text2:#888;
  --text3:#444;
  --green:#4ade80;
  --green-dim:rgba(74,222,128,0.12);
  --green-border:rgba(74,222,128,0.3);
  --amber:#fbbf24;
  --amber-dim:rgba(251,191,36,0.1);
  --red:#f87171;
  --red-dim:rgba(248,113,113,0.1);
  --accent:#4ade80;
  --r:10px;
  --r2:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
.wrap{max-width:580px;margin:0 auto;padding:1.5rem 1rem 5rem;}

/* HEADER */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;}
.header-date{}
.header-weekday{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.header-day{font-size:32px;font-weight:300;color:var(--text);line-height:1;}
.header-month{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);margin-top:4px;}
.sync-area{display:flex;align-items:center;gap:8px;margin-top:6px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite;}
.sync-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);cursor:pointer;}
.sync-label:hover{color:var(--text2);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* NAV */
.nav{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--surface);border-radius:var(--r2);padding:4px;border:1px solid var(--border);}
.nav-btn{flex:1;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;padding:7px 6px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-btn.active{background:var(--surface3);color:var(--text);font-weight:500;}

/* TODAY HEADER */
.today-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.today-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
.today-score{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
.prog-track{height:2px;background:var(--surface3);border-radius:1px;overflow:hidden;margin-bottom:1.25rem;}
.prog-bar{height:100%;border-radius:1px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* LOCKED */
.locked{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:3rem 2rem;text-align:center;margin-bottom:.75rem;}
.locked-title{font-size:14px;font-weight:500;margin-bottom:.4rem;}
.locked-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}

/* SECTION */
.section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin:1.5rem 0 .5rem;padding-bottom:6px;border-bottom:1px solid var(--border);}
.section-label:first-child{margin-top:0;}

/* ITEM */
.item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);transition:opacity .15s;}
.item:last-child{border-bottom:none;}
.check{width:20px;height:20px;border-radius:5px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.check:hover{border-color:var(--green-border);}
.check.on{background:var(--green-dim);border-color:var(--green-border);}
.check-icon{display:none;width:10px;height:7px;}
.check-icon path{stroke:var(--green);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.check.on .check-icon{display:block;}
.item-text{font-size:14px;flex:1;cursor:pointer;line-height:1.4;transition:color .15s;}
.item.on .item-text{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3);}
.item-acts{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.item:hover .item-acts{opacity:1;}
.act-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:3px 5px;border-radius:4px;font-family:'DM Mono',monospace;}
.act-btn:hover{color:var(--text);background:var(--surface3);}

/* ADD */
.add-btn{width:100%;margin-top:1rem;padding:9px;border-radius:var(--r);border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;}
.add-btn:hover{border-color:var(--border2);color:var(--text2);background:var(--surface);}

/* DATE NAV */
.date-nav{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;}
.dn-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.dn-btn:hover:not(:disabled){border-color:var(--border2);color:var(--text);}
.dn-btn:disabled{opacity:.25;cursor:default;}
.dn-label{font-size:13px;font-weight:500;flex:1;text-align:center;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.stat-val{font-size:28px;font-weight:300;}
.stat-val.g{color:var(--green);}
.stat-val.a{color:var(--amber);}
.dots-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:1.5rem;}
.dot{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8px;border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:default;}
.dot.full{background:var(--green-dim);border-color:var(--green-border);color:var(--green);}
.dot.half{background:var(--amber-dim);border-color:rgba(251,191,36,.3);color:var(--amber);}
.perf-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.perf-row:last-child{border-bottom:none;}
.perf-name{flex:1;color:var(--text);}
.perf-track{width:60px;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.perf-fill{height:100%;border-radius:2px;}
.perf-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);min-width:28px;text-align:right;}

/* ARCHIVE */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
.cal-month{font-size:14px;font-weight:500;flex:1;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1rem;}
.cal-dow{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-align:center;padding-bottom:5px;}
.cal-cell{aspect-ratio:1;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.cal-cell:hover:not(.empty){border-color:var(--border2);}
.cal-cell.empty{cursor:default;}
.cal-cell.today{border-color:var(--green-border)!important;color:var(--green);font-weight:500;}
.cal-cell.sel{background:var(--surface3);border-color:var(--border2)!important;}
.cal-pip{width:3px;height:3px;border-radius:50%;margin-top:2px;}
.arch-tabs{display:flex;gap:4px;margin-bottom:1rem;}
.arch-tab{font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;}
.arch-tab.active{background:var(--surface3);color:var(--text2);border-color:var(--border2);}
.arch-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.arch-row:last-child{border-bottom:none;}
.arch-row:hover{opacity:.8;}
.arch-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);min-width:100px;}
.arch-track{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.arch-fill{height:100%;border-radius:2px;}
.arch-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);min-width:30px;text-align:right;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.back-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;padding:5px 12px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;}
.back-btn:hover{border-color:var(--border2);color:var(--text);}
.day-title{font-size:13px;font-weight:500;}
.readonly{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-align:center;margin-top:1rem;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-bottom:.75rem;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:1.5rem;width:min(340px,92vw);}
.modal-title{font-size:14px;font-weight:500;margin-bottom:1.1rem;}
.modal input,.modal select{width:100%;font-size:13px;padding:9px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);margin-bottom:10px;outline:none;font-family:'DM Sans',sans-serif;}
.modal input:focus,.modal select:focus{border-color:var(--green-border);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:.25rem;}
.modal-btns button{font-size:12px;padding:7px 16px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;}
.modal-btns .ok{background:var(--green-dim);border-color:var(--green-border);color:var(--green);}
.modal-btns .ok:hover{background:var(--green-border);}

/* LOADING */
.loading{text-align:center;padding:4rem 2rem;color:var(--text3);}
.spin{display:inline-block;width:20px;height:20px;border:1px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:1rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-label{font-family:'DM Mono',monospace;font-size:11px;}
</style>
</head>
<body>
<div class="wrap">
  <div id="root"></div>
</div>
<script>
// ─── CONFIG ───────────────────────────────────────────
// Sostituisci con il tuo URL Apps Script dopo il deploy
var API_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
// ──────────────────────────────────────────────────────

var DEFAULT_ITEMS = {
  daily:[
    {id:'d1',section:'mattina',label:'Acqua appena sveglio'},
    {id:'d2',section:'mattina',label:'Lavare denti mattina'},
    {id:'d3',section:'mattina',label:'Skincare mattina'},
    {id:'d4',section:'mattina',label:'5 min: pianifica la giornata'},
    {id:'d5',section:'giorno',label:'1 ora focus lavoro'},
    {id:'d6',section:'giorno',label:'1 ora focus studio'},
    {id:'d7',section:'giorno',label:'Allenamento o stretching'},
    {id:'d8',section:'giorno',label:'2L acqua'},
    {id:'d9',section:'sera',label:'Lavare denti sera'},
    {id:'d10',section:'sera',label:'Skincare sera'},
    {id:'d11',section:'sera',label:'5 min: review giornata + priorità domani'}
  ],
  weekly:[
    {id:'w1',section:'corpo',label:'Doccia completa'},
    {id:'w2',section:'corpo',label:'Tagliare unghie'},
    {id:'w3',section:'corpo',label:'Peso + foto corpo'},
    {id:'w4',section:'casa',label:'Meal prep'},
    {id:'w5',section:'casa',label:'Pieno + lavaggio macchina'},
    {id:'w6',section:'casa',label:'Prepara vestiti settimana'},
    {id:'w7',section:'planning',label:'Review settimana'},
    {id:'w8',section:'planning',label:'Planning settimana successiva'},
    {id:'w9',section:'planning',label:'30 min input di qualità'}
  ],
  monthly:[
    {id:'m1',section:'spazio',label:'Sistema armadio'},
    {id:'m2',section:'spazio',label:'Sistema cassetti'},
    {id:'m3',section:'finanze',label:'Check finanze: entrate, uscite, saldo'},
    {id:'m4',section:'finanze',label:'Obiettivo mese successivo'},
    {id:'m5',section:'finanze',label:'Sposta quota in investimento'},
    {id:'m6',section:'relazioni',label:'Check relazioni: chi hai trascurato'},
    {id:'m7',section:'relazioni',label:'Rileggi obiettivi principali'},
    {id:'m8',section:'relazioni',label:'Fai una cosa nuova'}
  ]
};

// ─── STATE ───────────────────────────────────────────
var S = {
  items: JSON.parse(JSON.stringify(DEFAULT_ITEMS)),
  checks: {},
  view: 'daily',
  offsets: {daily:0,weekly:0,monthly:0},
  modal: null,
  calOffset: 0,
  archTab: 'daily',
  archDay: null,
  syncState: 'idle', // idle | loading | ok | err
  syncTime: ''
};

// ─── DATE UTILS ──────────────────────────────────────
function iso(d){ return d.toISOString().slice(0,10); }
function today(){ return iso(new Date()); }
function isSun(){ return new Date().getDay()===0; }
function isEOM(){ var n=new Date(); return n.getDate()===new Date(n.getFullYear(),n.getMonth()+1,0).getDate(); }
function dToSun(){ var d=new Date().getDay(); return d===0?7:7-d; }
function dToEOM(){ var n=new Date(); return new Date(n.getFullYear(),n.getMonth()+1,0).getDate()-n.getDate(); }

function wkey(d){ d=d||new Date(); var j=new Date(d.getFullYear(),0,1); var w=Math.ceil(((d-j)/864e5+j.getDay()+1)/7); return d.getFullYear()+'-W'+(''+w).padStart(2,'0'); }
function mkey(d){ d=d||new Date(); return d.getFullYear()+'-'+(''+( d.getMonth()+1)).padStart(2,'0'); }

function pkey(freq,off){
  off=off||0;
  if(freq==='daily'){var d=new Date();d.setDate(d.getDate()+off);return iso(d);}
  if(freq==='weekly'){var d=new Date();d.setDate(d.getDate()+off*7);return wkey(d);}
  var d=new Date();d.setMonth(d.getMonth()+off);return mkey(d);
}
function plabel(freq,off){
  off=off||0;
  if(freq==='daily'){
    if(off===0)return'oggi';if(off===-1)return'ieri';
    var d=new Date();d.setDate(d.getDate()+off);
    return d.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});
  }
  if(freq==='weekly'){if(off===0)return'questa settimana';if(off===-1)return'sett. scorsa';return pkey(freq,off);}
  if(off===0)return'questo mese';if(off===-1)return'mese scorso';
  var d=new Date();d.setMonth(d.getMonth()+off);return d.toLocaleDateString('it-IT',{month:'short',year:'numeric'});
}

function checked(id,freq,off){ return !!S.checks[pkey(freq,off)+'__'+id]; }
function checkedPK(id,pk){ return !!S.checks[pk+'__'+id]; }
function pct(freq,pk){ var its=S.items[freq]||[]; if(!its.length)return 0; return Math.round(its.filter(function(it){return checkedPK(it.id,pk);}).length/its.length*100); }
function pctOff(freq,off){ return pct(freq,pkey(freq,off)); }
function bcolor(p){ return p>=80?'var(--green)':p>=50?'var(--amber)':'var(--red)'; }

function sections(freq){
  var m={}; (S.items[freq]||[]).forEach(function(it){if(!m[it.section])m[it.section]=[];m[it.section].push(it);}); return m;
}

// ─── API ─────────────────────────────────────────────
function apiConfigured(){ return API_URL && API_URL !== 'YOUR_APPS_SCRIPT_URL_HERE'; }

function apiCall(params, onOk, onErr){
  if(!apiConfigured()){
    // Offline mode — use localStorage
    if(params.action==='getAll') onOk({rows: lsGetChecks()});
    else if(params.action==='getItems') onOk({items: lsGetItems()});
    else if(params.action==='setCheck'){ lsSetCheck(params); onOk({status:'ok'}); }
    else if(params.action==='saveItems'){ lsSaveItems(JSON.parse(params.items)); onOk({status:'ok'}); }
    return;
  }
  var cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
  var script = document.createElement('script');
  var timer = setTimeout(function(){ 
    delete window[cbName]; 
    if(script.parentNode) script.parentNode.removeChild(script);
    onErr('timeout'); 
  }, 10000);
  window[cbName] = function(d){
    clearTimeout(timer);
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
    if(d.error) onErr(d.error); else onOk(d);
  };
  params.callback = cbName;
  var qs = Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  script.src = API_URL + '?' + qs;
  script.onerror = function(){ clearTimeout(timer); delete window[cbName]; onErr('script error'); };
  document.head.appendChild(script);
}

// ─── LOCALSTORAGE (offline fallback) ─────────────────
function lsGetChecks(){
  try{ var d=localStorage.getItem('ht_checks'); return d?JSON.parse(d):[]; }catch(e){return[];}
}
function lsGetItems(){
  try{ var d=localStorage.getItem('ht_items'); return d?JSON.parse(d):null; }catch(e){return null;}
}
function lsSetCheck(p){
  try{
    var rows=lsGetChecks();
    var found=false;
    for(var i=0;i<rows.length;i++){
      if(rows[i].period_key===p.period_key&&rows[i].item_id===p.item_id){rows[i].checked=(p.checked==='true');found=true;break;}
    }
    if(!found) rows.push({date:p.date,period_key:p.period_key,item_id:p.item_id,item_label:p.item_label,tab:p.tab,checked:(p.checked==='true')});
    localStorage.setItem('ht_checks',JSON.stringify(rows));
  }catch(e){}
}
function lsSaveItems(items){
  try{localStorage.setItem('ht_items',JSON.stringify(items));}catch(e){}
}

// ─── LOAD ─────────────────────────────────────────────
function loadAll(){
  S.syncState='loading'; render();
  var got={d:null,i:null};
  function done(){
    if(got.d===null||got.i===null) return;
    if(got.i&&got.i.items) S.items=got.i.items;
    S.checks={};
    (got.d.rows||[]).forEach(function(r){ S.checks[r.period_key+'__'+r.item_id]=r.checked; });
    S.syncState='ok';
    S.syncTime=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    render();
  }
  apiCall({action:'getAll'},function(d){got.d=d;done();},function(e){S.syncState='err';S.syncTime=e;render();});
  apiCall({action:'getItems'},function(d){got.i=d;done();},function(e){S.syncState='err';render();});
}

function pushCheck(id,freq,pk,val){
  var it=(S.items[freq]||[]).filter(function(i){return i.id===id;})[0];
  apiCall({
    action:'setCheck',
    date: freq==='daily'?pk:today(),
    period_key:pk, item_id:id,
    item_label:it?it.label:'', tab:freq, checked:String(val)
  }, function(){
    S.syncState='ok';
    S.syncTime=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    render();
  }, function(){ S.syncState='err'; render(); });
}

function pushItems(){
  apiCall({action:'saveItems',items:JSON.stringify(S.items)},function(){},function(){});
}

// ─── RENDER HELPERS ──────────────────────────────────
function headerHTML(){
  var n=new Date();
  var wd=n.toLocaleDateString('it-IT',{weekday:'long'});
  var day=n.getDate();
  var mo=n.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  var dot='sync-dot'+(S.syncState==='ok'?' ok':S.syncState==='err'?' err':S.syncState==='loading'?' loading':'');
  var slabel=S.syncState==='err'?'errore':S.syncState==='loading'?'sync...':S.syncTime?S.syncTime:'';
  return '<div class="header">'+
    '<div class="header-date">'+
      '<div class="header-weekday">'+wd+'</div>'+
      '<div class="header-day">'+day+'</div>'+
      '<div class="header-month">'+mo+'</div>'+
    '</div>'+
    '<div class="sync-area">'+
      '<span class="'+dot+'"></span>'+
      '<span class="sync-label" onclick="loadAll()">'+slabel+'</span>'+
    '</div>'+
  '</div>';
}

function navHTML(){
  var tabs=[{id:'daily',l:'Daily'},{id:'weekly',l:'Weekly'},{id:'monthly',l:'Monthly'},{id:'stats',l:'Stats'},{id:'archive',l:'Archivio'}];
  return '<div class="nav">'+tabs.map(function(t){
    return '<button class="nav-btn'+(S.view===t.id?' active':'')+'" onclick="sv(\''+t.id+'\')">'+t.l+'</button>';
  }).join('')+'</div>';
}

// ─── CHECKLIST ───────────────────────────────────────
function checklistHTML(freq){
  var off=S.offsets[freq]||0;
  if(freq==='weekly'&&off===0&&!isSun()){
    var d=dToSun();
    return '<div class="locked"><div class="locked-title">Check settimanale</div><div class="locked-sub">domenica — mancano '+d+' giorn'+(d===1?'o':'i')+'</div></div>';
  }
  if(freq==='monthly'&&off===0&&!isEOM()){
    var d=dToEOM();
    return '<div class="locked"><div class="locked-title">Check mensile</div><div class="locked-sub">fine mese — mancano '+d+' giorn'+(d===1?'o':'i')+'</div></div>';
  }
  var its=S.items[freq]||[];
  var done=its.filter(function(it){return checked(it.id,freq,off);}).length;
  var p=its.length?Math.round(done/its.length*100):0;
  var secs=sections(freq);
  var bc=bcolor(p);
  var h='';
  h+='<div class="today-bar">';
  h+='<div class="date-nav" style="flex:1;margin-bottom:0;">';
  h+='<button class="dn-btn" onclick="nav(\''+freq+'\',-1)">&#8592;</button>';
  h+='<span class="dn-label">'+plabel(freq,off)+'</span>';
  h+='<button class="dn-btn" onclick="nav(\''+freq+'\',1)"'+(off>=0?' disabled':'')+'>&#8594;</button>';
  h+='</div>';
  h+='<span style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--text2);margin-left:12px;">'+done+'/'+its.length+'</span>';
  h+='</div>';
  h+='<div class="prog-track"><div class="prog-bar" style="width:'+p+'%;background:'+bc+'"></div></div>';
  Object.keys(secs).forEach(function(s){
    h+='<div class="section-label">'+s+'</div>';
    secs[s].forEach(function(it){
      var c=checked(it.id,freq,off);
      h+='<div class="item'+(c?' on':'')+'">';
      h+='<div class="check'+(c?' on':'')+'" onclick="tog(\''+it.id+'\',\''+freq+'\')">';
      h+='<svg class="check-icon" viewBox="0 0 10 7"><path d="M1 3.5L4 6.5L9 1"/></svg></div>';
      h+='<span class="item-text" onclick="tog(\''+it.id+'\',\''+freq+'\')">'+it.label+'</span>';
      h+='<div class="item-acts">';
      h+='<button class="act-btn" onclick="oEdit(\''+freq+'\',\''+it.id+'\')">edit</button>';
      h+='<button class="act-btn" onclick="oDel(\''+freq+'\',\''+it.id+'\')">del</button>';
      h+='</div></div>';
    });
  });
  h+='<button class="add-btn" onclick="oAdd(\''+freq+'\')">+ aggiungi voce</button>';
  return h;
}

// ─── STATS ───────────────────────────────────────────
function statsHTML(){
  var days=[];
  for(var i=29;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);var pk=iso(d);days.push({pk:pk,p:pct('daily',pk),day:d.getDate()});}
  var avg=Math.round(days.reduce(function(a,d){return a+d.p;},0)/days.length);
  var streak=0; for(var i=0;i<365;i++){var d=new Date();d.setDate(d.getDate()-i);if(pct('daily',iso(d))>=80)streak++;else break;}
  var perfect=days.filter(function(d){return d.p===100;}).length;

  var h='<div class="stats-row">';
  h+='<div class="stat"><div class="stat-label">streak</div><div class="stat-val g">'+streak+'<span style="font-size:14px">d</span></div></div>';
  h+='<div class="stat"><div class="stat-label">media 30gg</div><div class="stat-val '+(avg>=80?'g':avg>=50?'a':'')+'">'+avg+'<span style="font-size:14px">%</span></div></div>';
  h+='<div class="stat"><div class="stat-label">giorni 100%</div><div class="stat-val">'+perfect+'</div></div>';
  h+='</div>';

  h+='<div class="section-label" style="margin-top:0">ultimi 30 giorni</div>';
  h+='<div class="dots-row">';
  days.forEach(function(d){
    var cls=d.p===100?'full':d.p>=50?'half':'';
    h+='<div class="dot '+cls+'" title="'+d.pk+': '+d.p+'%">'+d.day+'</div>';
  });
  h+='</div>';

  [['daily',7,'daily','7 giorni'],['weekly',4,'weekly','4 settimane'],['monthly',3,'monthly','3 mesi']].forEach(function(x){
    var freq=x[0],nP=x[1],lbl=x[2],sub=x[3];
    var rows=(S.items[freq]||[]).map(function(it){
      var c=0; for(var i=0;i<nP;i++) if(checked(it.id,freq,-i)) c++;
      return {label:it.label,p:Math.round(c/nP*100)};
    }).sort(function(a,b){return b.p-a.p;});
    if(!rows.length) return;
    h+='<div class="section-label">'+lbl+' — ultimi '+sub+'</div>';
    rows.forEach(function(r){
      var bc=bcolor(r.p);
      h+='<div class="perf-row"><span class="perf-name">'+r.label+'</span><div class="perf-track"><div class="perf-fill" style="width:'+r.p+'%;background:'+bc+'"></div></div><span class="perf-pct">'+r.p+'%</span></div>';
    });
  });
  return h;
}

// ─── ARCHIVE ─────────────────────────────────────────
function archiveHTML(){
  if(S.archDay) return dayDetailHTML(S.archDay);

  var now=new Date(); now.setMonth(now.getMonth()+S.calOffset);
  var year=now.getFullYear(), month=now.getMonth();
  var first=new Date(year,month,1), last=new Date(year,month+1,0);
  var ml=first.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  var tod=today();

  var h='<div class="card">';
  h+='<div class="cal-nav">';
  h+='<button class="dn-btn" onclick="calNav(-1)">&#8592;</button>';
  h+='<span class="cal-month">'+ml.charAt(0).toUpperCase()+ml.slice(1)+'</span>';
  h+='<button class="dn-btn" onclick="calNav(1)"'+(S.calOffset>=0?' disabled':'')+'>&#8594;</button>';
  h+='</div>';
  h+='<div class="cal-grid">';
  ['L','M','M','G','V','S','D'].forEach(function(d){h+='<div class="cal-dow">'+d+'</div>';});
  var startDow=(first.getDay()+6)%7;
  for(var i=0;i<startDow;i++) h+='<div class="cal-cell empty"></div>';
  for(var day=1;day<=last.getDate();day++){
    var d=new Date(year,month,day); var pk=iso(d);
    var p=pct('daily',pk); var fut=pk>tod;
    var pip=fut?'transparent':p>=80?'var(--green)':p>0?'var(--amber)':'var(--text3)';
    var cls=(pk===tod?' today':'')+(S.archDay===pk?' sel':'');
    h+='<div class="cal-cell'+cls+'" onclick="selDay(\''+pk+'\')">'+day+'<div class="cal-pip" style="background:'+pip+'"></div></div>';
  }
  h+='</div></div>';

  h+='<div class="arch-tabs">';
  ['daily','weekly','monthly'].forEach(function(t){
    h+='<button class="arch-tab'+(S.archTab===t?' active':'')+'" onclick="setAT(\''+t+'\')">'+t+'</button>';
  });
  h+='</div>';

  var nP=S.archTab==='daily'?30:S.archTab==='weekly'?12:6;
  var seen={};
  for(var i=0;i<nP;i++){
    var pk=pkey(S.archTab,-i); if(seen[pk]) continue; seen[pk]=1;
    var p=pct(S.archTab,pk); var lbl=plabel(S.archTab,-i);
    h+='<div class="arch-row"'+(S.archTab==='daily'?' onclick="selDay(\''+pk+'\')"':'')+'>'+
      '<span class="arch-date">'+lbl+'</span>'+
      '<div class="arch-track"><div class="arch-fill" style="width:'+p+'%;background:'+bcolor(p)+'"></div></div>'+
      '<span class="arch-pct">'+p+'%</span></div>';
  }
  return h;
}

function dayDetailHTML(pk){
  var its=S.items['daily']||[];
  var secs=sections('daily');
  var done=its.filter(function(it){return checkedPK(it.id,pk);}).length;
  var p=its.length?Math.round(done/its.length*100):0;
  var d=new Date(pk+'T12:00:00');
  var lbl=d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  var isTod=pk===today();
  var h='<div class="back-row"><button class="back-btn" onclick="S.archDay=null;render()">&#8592; indietro</button><span class="day-title">'+lbl+'</span></div>';
  h+='<div class="prog-track"><div class="prog-bar" style="width:'+p+'%;background:'+bcolor(p)+'"></div></div>';
  Object.keys(secs).forEach(function(s){
    h+='<div class="section-label">'+s+'</div>';
    secs[s].forEach(function(it){
      var c=checkedPK(it.id,pk);
      h+='<div class="item'+(c?' on':'')+'">';
      h+='<div class="check'+(c?' on':'')+'"'+(isTod?' onclick="togPK(\''+it.id+'\',\'daily\',\''+pk+'\')"':' style="cursor:default"')+'>';
      h+='<svg class="check-icon" viewBox="0 0 10 7"><path d="M1 3.5L4 6.5L9 1"/></svg></div>';
      h+='<span class="item-text">'+it.label+'</span></div>';
    });
  });
  if(!isTod) h+='<div class="readonly">sola lettura</div>';
  return h;
}

// ─── MODAL ───────────────────────────────────────────
function modalHTML(){
  if(!S.modal) return '';
  var isEdit=S.modal.type==='edit';
  var secs=[]; (S.items[S.modal.freq]||[]).forEach(function(i){if(secs.indexOf(i.section)===-1)secs.push(i.section);});
  var opts=secs.map(function(s){return'<option value="'+s+'">'+s+'</option>';}).join('')+'<option value="__new__">+ nuova sezione</option>';
  return '<div class="overlay" onclick="if(event.target===this)closeM()">'+
    '<div class="modal">'+
    '<div class="modal-title">'+(isEdit?'modifica voce':'nuova voce')+'</div>'+
    '<input id="ml" type="text" placeholder="nome voce" value="'+(isEdit?S.modal.item.label:'')+'">'+
    '<select id="ms">'+opts+'</select>'+
    '<input id="mn" type="text" placeholder="nome nuova sezione" style="display:none">'+
    '<div class="modal-btns"><button onclick="closeM()">annulla</button><button class="ok" onclick="submitM()">'+(isEdit?'salva':'aggiungi')+'</button></div>'+
    '</div></div>';
}

// ─── MAIN RENDER ─────────────────────────────────────
function render(){
  var content='';
  if(S.syncState==='loading'&&Object.keys(S.checks).length===0){
    content='<div class="loading"><div class="spin"></div><div class="load-label">caricamento...</div></div>';
  } else if(S.view==='stats') content=statsHTML();
  else if(S.view==='archive') content=archiveHTML();
  else content=checklistHTML(S.view);

  document.getElementById('root').innerHTML=headerHTML()+navHTML()+content+modalHTML();

  if(S.modal){
    var sel=document.getElementById('ms'), ns=document.getElementById('mn');
    if(sel&&ns){
      if(S.modal.type==='edit') for(var i=0;i<sel.options.length;i++) if(sel.options[i].value===S.modal.item.section) sel.options[i].selected=true;
      sel.addEventListener('change',function(){ns.style.display=sel.value==='__new__'?'block':'none';});
    }
    setTimeout(function(){var el=document.getElementById('ml');if(el){el.focus();el.select();}},50);
  }
}

// ─── ACTIONS ─────────────────────────────────────────
window.sv=function(v){S.view=v;render();};
window.nav=function(freq,dir){S.offsets[freq]=(S.offsets[freq]||0)+dir;if(S.offsets[freq]>0)S.offsets[freq]=0;render();};
window.calNav=function(dir){S.calOffset+=dir;if(S.calOffset>0)S.calOffset=0;render();};
window.setAT=function(t){S.archTab=t;render();};
window.selDay=function(pk){S.archDay=pk;render();};

window.tog=function(id,freq){
  var off=S.offsets[freq]||0; var pk=pkey(freq,off);
  var val=!checked(id,freq,off); S.checks[pk+'__'+id]=val; render(); pushCheck(id,freq,pk,val);
};
window.togPK=function(id,freq,pk){
  var val=!checkedPK(id,pk); S.checks[pk+'__'+id]=val; render(); pushCheck(id,freq,pk,val);
};
window.oAdd=function(freq){S.modal={type:'add',freq:freq};render();};
window.oEdit=function(freq,id){
  var it=(S.items[freq]||[]).filter(function(i){return i.id===id;})[0];
  if(it) S.modal={type:'edit',freq:freq,item:JSON.parse(JSON.stringify(it))};
  render();
};
window.closeM=function(){S.modal=null;render();};
window.oDel=function(freq,id){
  if(!confirm('Eliminare questa voce?'))return;
  S.items[freq]=(S.items[freq]||[]).filter(function(i){return i.id!==id;});
  pushItems();render();
};
window.submitM=function(){
  var label=document.getElementById('ml').value.trim();
  var sel=document.getElementById('ms'); var ns=document.getElementById('mn');
  var section=sel.value==='__new__'?(ns.value.trim()||'altro'):sel.value;
  if(!label)return;
  if(S.modal.type==='add'){
    if(!S.items[S.modal.freq])S.items[S.modal.freq]=[];
    S.items[S.modal.freq].push({id:'i'+Date.now(),section:section,label:label});
  } else {
    var arr=S.items[S.modal.freq];
    for(var i=0;i<arr.length;i++) if(arr[i].id===S.modal.item.id){arr[i].label=label;arr[i].section=section;break;}
  }
  pushItems();window.closeM();
};

// ─── INIT ─────────────────────────────────────────────
loadAll();
</script>
</body>
